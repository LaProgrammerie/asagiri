product: workspace-saas
flows:
    - id: workspace-onboarding
      title: Workspace onboarding
      entry_screen: landing
      steps:
        - id: step-1
          screen: landing
          action: click_get_started
          next: signup
          contract_ref: POST /api/workspaces
          errors:
            - email_taken
        - id: step-2
          screen: signup
          action: submit_signup
          next: dashboard
          contract_ref: TODO:auth.signup
          sensitive: true
          errors:
            - weak_password
      outcome: workspace_created
screens:
    - id: landing
      title: Landing
      route: /
      states:
        - idle
      actions:
        - click_get_started
    - id: signup
      title: Signup
      route: /signup
      states:
        - idle
        - submitting
        - error
      actions:
        - submit_signup
    - id: dashboard
      title: Dashboard
      route: /dashboard
      states:
        - ready
      actions:
        - invite_member
