name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          # Publishes GitHub Release assets for this repository.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Tag being released (e.g. v0.1.0).
          GORELEASER_CURRENT_TAG: ${{ github.ref_name }}
          # PAT with contents:write on LaProgrammerie/homebrew-tap (repo secret).
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
