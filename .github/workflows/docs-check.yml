name: Check documentation

on:
  pull_request:
    paths:
      - 'docs-site/**'
      - '.github/workflows/docs-check.yml'
      - '.github/workflows/docs-cloudflare-pages.yml'
  workflow_dispatch:

concurrency:
  group: docs-check-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate-docs:
    name: Typecheck, lint, and build docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: docs-site
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate CLI reference
        working-directory: ${{ github.workspace }}
        run: go run ./application/cmd/asa docs generate-cli --output docs-site/content/docs/en/cli/generated

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build static docs
        run: pnpm build

      - name: Verify static output
        run: test -d out
