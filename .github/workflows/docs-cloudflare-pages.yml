name: Deploy documentation

on:
  push:
    branches:
      - main
    paths:
      - 'docs-site/**'
      - '.github/workflows/docs-cloudflare-pages.yml'
  pull_request:
    paths:
      - 'docs-site/**'
      - '.github/workflows/docs-cloudflare-pages.yml'
  workflow_dispatch:

concurrency:
  group: docs-cloudflare-pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy-docs:
    name: Build and deploy docs
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: docs-site
    permissions:
      contents: read
      deployments: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Generate CLI reference
        working-directory: ${{ github.workspace }}
        run: go run ./application/cmd/agentflow docs generate-cli --output docs-site/content/docs/en/cli/generated

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: docs-site/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Build static docs
        run: pnpm build

      - name: Verify static output
        run: test -d out

      - name: Deploy preview to Cloudflare Pages
        if: github.event_name == 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: docs-site
          command: pages deploy out --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }} --branch=${{ github.head_ref }}

      - name: Deploy production to Cloudflare Pages
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: docs-site
          command: pages deploy out --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT }} --branch=main
