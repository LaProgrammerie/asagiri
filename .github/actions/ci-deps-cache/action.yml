name: ci-deps-cache
description: Restore/save dependency caches for CI jobs
runs:
  using: composite
  steps:
    - name: Cache Composer vendors
      uses: actions/cache@v4
      with:
        path: |
          application/vendor
          tools/phpstan/vendor
          tools/php-cs-fixer/vendor
          tools/twig-cs-fixer/vendor
          tools/deptrac/vendor
          tools/phparkitect/vendor
          tools/rector/vendor
        key: deps-composer-${{ runner.os }}-${{ hashFiles('application/composer.lock', 'tools/**/composer.lock') }}
        restore-keys: |
          deps-composer-${{ runner.os }}-

    - name: Cache Node modules
      uses: actions/cache@v4
      with:
        path: |
          application/node_modules
        key: deps-node-${{ runner.os }}-${{ hashFiles('application/package-lock.json', 'application/yarn.lock') }}
        restore-keys: |
          deps-node-${{ runner.os }}-
