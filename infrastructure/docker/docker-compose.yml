# Environnement de dev optionnel : toolchain Go alignée, accès au dépôt monté.
services:
  dev:
    build:
      context: ../..
      dockerfile: infrastructure/docker/Dockerfile.dev
    working_dir: /app
    volumes:
      - ../..:/app
      - go-mod-cache:/go/pkg/mod
      - go-build-cache:/root/.cache/go-build
    environment:
      - CGO_ENABLED=0
    command: sleep infinity

volumes:
  go-mod-cache:
  go-build-cache:
